{% extends 'tasks/base.html' %}
{% block title %}Delete Category{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white"><h4 class="mb-0">Delete Category</h4></div>
            <div class="card-body">
                <p>Delete <strong>{{ object.name }}</strong>?</p>
                <form method="post">{% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Delete</button>
                    <a href="{% url 'category_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
