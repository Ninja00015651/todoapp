{% extends 'tasks/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="fas fa-sign-in-alt me-2 text-primary"></i>Login</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                               class="form-control {% if field.errors %}is-invalid{% endif %}"
                               {% if field.value %}value="{{ field.value }}"{% endif %}>
                        {% for error in field.errors %}<div class="invalid-feedback">{{ error }}</div>{% endfor %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Don't have an account? <a href="{% url 'register' %}">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
