version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: todoapp_db_dev
    environment:
      POSTGRES_DB: todoapp_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dev_network

  web:
    build:
      context: .
      target: builder
    container_name: todoapp_web_dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-not-for-production"
      POSTGRES_DB: todoapp_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      ALLOWED_HOSTS: "localhost 127.0.0.1"
    depends_on:
      - db
    networks:
      - dev_network

volumes:
  postgres_dev_data:

networks:
  dev_network:
    driver: bridge
